# .github/workflows/daily-fetch.yml

name: Daily MarkSix Full Data Update

permissions:
  contents: write

on:
  schedule:
    - cron: '32 0,12,18,22 * * *' # HKT => 00:32,12:32,18:32,22:32
      timezone: 'Asia/Hong_Kong'
    - cron: '32 21 * * *' # HKT 21:32 (post-draw polling kickoff)
      timezone: 'Asia/Hong_Kong'
  workflow_dispatch:

concurrency:
  group: daily-mark6-update-main
  cancel-in-progress: false

jobs:
  update-json:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full crawler
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" != "schedule" || "$EVENT_SCHEDULE" != "32 21 * * *" ]]; then
            python marksix_full_crawler.py
            exit 0
          fi

          max_attempts=23
          interval_seconds=120

          mapfile -t target_info < <(python - <<'PY'
            import json

            with open("docs/marksix_all.json", encoding="utf-8") as file:
              data = json.load(file)

            next_draw = data.get("nextDraw") or {}
            target_draw_no = next_draw.get("no")
            target_close_date = (next_draw.get("closeDate") or "")[:10]

            print("" if target_draw_no is None else target_draw_no)
            print(target_close_date)
            PY
          )

          export TARGET_DRAW_NO="${target_info[0]}"
          export TARGET_CLOSE_DATE="${target_info[1]}"

          echo "Target draw no: ${TARGET_DRAW_NO:-unknown}"
          echo "Target close date: ${TARGET_CLOSE_DATE:-unknown}"

          for attempt in $(seq 1 "$max_attempts"); do
            echo "Polling attempt $attempt/$max_attempts"
            python marksix_full_crawler.py

            if python - <<'PY'
              import json
              import os
              import sys
              from datetime import datetime, timedelta, timezone

              with open("docs/marksix_all.json", encoding="utf-8") as file:
                data = json.load(file)

              today_hkt = (datetime.now(timezone.utc) + timedelta(hours=8)).strftime("%Y-%m-%d")
              target_draw_no = os.environ.get("TARGET_DRAW_NO", "")
              target_close_date = os.environ.get("TARGET_CLOSE_DATE", "")
              last_draw = data.get("lastDraw", {})
              next_draw = data.get("nextDraw", {})

              last_close = (last_draw.get("closeDate") or "")[:10]
              next_close = (next_draw.get("closeDate") or "")[:10]
              last_status = last_draw.get("status")
              last_no = "" if last_draw.get("no") is None else str(last_draw.get("no"))

              if target_draw_no and last_no == target_draw_no and last_status == "Result":
                print(f"Target draw {target_draw_no} result is ready.")
                sys.exit(0)

              if target_close_date and target_close_date != today_hkt:
                print("No draw scheduled for tonight. Stop polling.")
                sys.exit(0)

              if not target_close_date and last_close != today_hkt and next_close != today_hkt:
                print("No draw scheduled for tonight. Stop polling.")
                sys.exit(0)

              print(f"Draw result still pending. Current last draw no/status: {last_no}/{last_status}")
              sys.exit(1)
              PY
            then
              break
            fi

            if [[ "$attempt" -eq "$max_attempts" ]]; then
              echo "Polling window ended before the latest result appeared."
              break
            fi

            echo "Waiting ${interval_seconds}s before retrying..."
            sleep "$interval_seconds"
          done

      - name: Ensure docs folder & disable Jekyll
        run: |
          mkdir -p docs
          touch docs/.nojekyll

      - name: Commit and push only when changed
        run: |
          set -euo pipefail

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git add docs/marksix_all.json docs/.nojekyll

          if git diff --staged --quiet; then
            echo "No data changes. Skip commit and push."
            exit 0
          fi

          git commit -m "ci: update marksix_all.json"

          # Rebase with remote tip to avoid non-fast-forward failures.
          git pull --rebase origin main
          git push origin HEAD:main
